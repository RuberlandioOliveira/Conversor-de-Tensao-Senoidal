<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Conversor Vpp ↔ Vrms + dB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-image: url(https://picsum.photos/1920/1080);
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #111;
        }

        .container {
            background: rgb(161, 163, 184);
            padding: 18px;
            border-radius: 14px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 10px;
            color: #1a237e;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
            font-size: 14px;
        }

        input[type=number] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 4px;
            border-radius: 8px;
            border: 1px solid #999;
        }

        .slider {
            width: 100%;
            margin-top: 10px;
        }

        .vuBar {
            width: 100%;
            height: 22px;
            border-radius: 6px;
            background: linear-gradient(90deg,
                    #00ff00 0%,
                    #00ff00 55%,
                    yellow 70%,
                    orange 85%,
                    red 100%);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .vuMask {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 50%;
            background: #111;
            transition: width .15s;
        }

        .dbDisplay {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 6px;
        }

        .dbControls {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .dbControls button {
            flex: 1;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #1a237e;
            color: white;
        }

        .dbControls button:active {
            background: #3949ab;
        }

        button:hover {
            background-color: #06bf10;
        }

        .result {
            margin-top: 15px;
            padding: 14px;
            border-radius: 10px;
            background: #e8f5e9;
            font-size: 15px;
        }

        .result ul {
            padding-left: 18px;
            margin: 5px 0;
            color: #055e14;

        }

        .result li {
            margin: 4px 0;
            color: #023d07;
        }

        #scope {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Conversor Vpp ↔ Vrms</h1>

        <label>Vpp (pico a pico)</label>
        <input type="number" id="vpp" step="any" oninput="converter('vpp')">

        <label>Vrms</label>
        <input type="number" id="vrms" step="any" oninput="converter('vrms')">

        <label>Variação em dB</label>

        <input type="range" id="dbSlider" class="slider" min="-60" max="60" value="0" step="0.1" oninput="sliderDB()">

        <div class="vuBar">
            <div class="vuMask" id="vuMask"></div>
        </div>

        <div class="dbDisplay">
            <span id="dbValor">0</span> dB
        </div>

        <input type="number" id="dbInput" step="0.1" value="0" oninput="digitarDB()">

        <div class="dbControls">
            <button onclick="ajustarDB(-1)">−1 dB</button>
            <button onclick="ajustarDB(1)">+1 dB</button>
        </div>

        <canvas id="scope" width="380" height="120"></canvas>

        <div class="result" id="resultado"></div>

    </div>

    <script>

        let db = 0;

        /* formatação com limite de casas */
        function formatar(valor, casas = 3) {
            return new Intl.NumberFormat("pt-BR", {
                minimumFractionDigits: 0,
                maximumFractionDigits: casas
            }).format(valor);
        }

        /* VU meter */

        function atualizarVU() {

            let slider = document.getElementById("dbSlider");

            let min = Number(slider.min);
            let max = Number(slider.max);
            let val = Number(slider.value);

            let percent = (val - min) / (max - min) * 100;

            document.getElementById("vuMask").style.width = (100 - percent) + "%";
        }

        function atualizarTudo() {

            document.getElementById("dbValor").innerText = formatar(db, 1);

            document.getElementById("dbSlider").value = db;

            document.getElementById("dbInput").value = db;

            atualizarVU();

            converter();
        }

        function sliderDB() {

            db = parseFloat(document.getElementById("dbSlider").value);

            atualizarTudo();
        }

        function digitarDB() {

            db = parseFloat(document.getElementById("dbInput").value);

            if (isNaN(db)) return;

            atualizarTudo();
        }

        function ajustarDB(v) {

            db += v;

            if (db > 60) db = 60;
            if (db < -60) db = -60;

            atualizarTudo();
        }

        /* conversor */

        function converter(origem) {

            let vppInput = parseFloat(document.getElementById("vpp").value);
            let vrmsInput = parseFloat(document.getElementById("vrms").value);

            let vpp, vrms;

            if (origem === "vpp") {

                if (isNaN(vppInput)) return;

                vpp = vppInput;
                vrms = vpp / (2 * Math.sqrt(2));

                document.getElementById("vrms").value = formatar(vrms, 3);
            }

            else if (origem === "vrms") {

                if (isNaN(vrmsInput)) return;

                vrms = vrmsInput;
                vpp = vrms * 2 * Math.sqrt(2);

                document.getElementById("vpp").value = formatar(vpp, 3);
            }

            else {

                if (!isNaN(vppInput)) {
                    vpp = vppInput;
                    vrms = vpp / (2 * Math.sqrt(2));
                }
                else if (!isNaN(vrmsInput)) {
                    vrms = vrmsInput;
                    vpp = vrms * 2 * Math.sqrt(2);
                }
                else return;
            }

            /* precisão maior */

            const fator = Math.pow(10, db / 20);

            const vppDb = vpp * fator;
            const vrmsDb = vrms * fator;

            document.getElementById("resultado").innerHTML = `

<b>Resultado</b>

<ul>
<li>Vpp: <b>${formatar(vpp, 3)}</b> V</li>
<li>Vrms: <b>${formatar(vrms, 3)}</b> V</li>
</ul>

<b>Com ${formatar(db, 1)} dB</b>

<ul>
<li>Vpp: <b>${formatar(vppDb, 3)}</b> V</li>
<li>Vrms: <b>${formatar(vrmsDb, 3)}</b> V</li>
<li>Fator: <b>${formatar(fator, 4)}</b> x</li>
</ul>
<li> <b>Desenvolvido por Ruberlandio</b> </li>

`;
        }

        /* osciloscópio */

        const canvas = document.getElementById("scope");
        const ctx = canvas.getContext("2d");

        let fase = 0;

        function desenharOsciloscopio() {

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;

            ctx.beginPath();

            let amplitude = 40 * Math.pow(10, db / 20);

            for (let x = 0; x < canvas.width; x++) {

                let y = canvas.height / 2 +
                    Math.sin((x * 0.05) + fase) * amplitude;

                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

            }

            ctx.stroke();

            fase += 0.05;

            requestAnimationFrame(desenharOsciloscopio);
        }

        desenharOsciloscopio();

        atualizarVU();

    </script>

</body>

</html>
